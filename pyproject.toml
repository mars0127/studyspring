[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [".venv", "studyspring.db", "course_packs"]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pyright]
pythonVersion = "3.11"
exclude = [".venv", "studyspring.db"]
typeCheckingMode = "basic"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
