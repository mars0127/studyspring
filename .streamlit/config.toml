[theme]
primaryColor = "#2F855A"
backgroundColor = "#F7FAFC"
secondaryBackgroundColor = "#EDF2F7"
textColor = "#1A202C"
font = "sans serif"

[client]
# Keep implementation details out of student-facing error screens.
showErrorDetails = "none"

[server]
# Large scanned textbooks need more room than Streamlit's default upload limit.
maxUploadSize = 300
