[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [".venv", "studyspring.db", "course_packs", "app.py", "components", "database.py", "gemini_client.py", "ollama_client.py", "pages", "services", "tests", "tools", "course_starters.py"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501", "E701", "E702", "I001"]

[tool.ruff.lint.per-file-ignores]
"app.py" = ["F401", "I001"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pyright]
pythonVersion = "3.11"
exclude = [".venv", "studyspring.db"]
typeCheckingMode = "basic"
include = ["scripts"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
pythonpath = ["."]
